    comments: |
      LwM2M Advanced Firmware Update dual bank support: replaces single
      application/modem instances with bank1/bank0 instances, derives
      img_num from obj_inst_id and reads bank's firmware versions from
      PM_MCUBOOT_PRIMARY_ID and PM_MCUBOOT_PRIMARY_1_ID.

